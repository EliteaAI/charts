{{- if ne .Values.enabled false }}
{{- $fullName := include "common.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  replicas: {{ default 1 .Values.replicaCount }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "common.labels.selector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.labels.standard" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "common.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ default 8080 .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- range $key, $ref := .Values.configRefs }}
            {{- if $ref }}
            - name: {{ $key | upper }}
              valueFrom:
                configMapKeyRef:
                  name: {{ $ref.configMapName | default $fullName }}
                  key: {{ $ref.key }}
            {{- end }}
            {{- end }}
            {{- range $key, $ref := .Values.secretRefs }}
            {{- if $ref }}
            - name: {{ $key | upper }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName | default (printf "%s-secret" $fullName) }}
                  key: {{ $ref.key }}
            {{- end }}
            {{- end }}
          volumeMounts:
            {{- with .Values.storage }}
            {{- if .enabled }}
            - name: data
              mountPath: {{ default "/data" .mountPath }}
            {{- end }}
            {{- end }}
            {{- with .Values.tmpStorage }}
            {{- if .enabled }}
            - name: tmp
              mountPath: {{ default "/tmp" .mountPath }}
            {{- end }}
            {{- end }}
            {{- with .Values.config }}
            {{- if and .enabled .files }}
            - name: config
              mountPath: {{ default "/data/configs" .mountPath }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- with .Values.storage }}
        {{- if .enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .existingClaim | default $fullName }}
        {{- end }}
        {{- end }}
        {{- with .Values.tmpStorage }}
        {{- if .enabled }}
        - name: tmp
          emptyDir:
            {{- if .sizeLimit }}
            sizeLimit: {{ .sizeLimit }}
            {{- end }}
        {{- end }}
        {{- end }}
        {{- with .Values.config }}
        {{- if and .enabled .files }}
        - name: config
          configMap:
            name: {{ $fullName }}
        {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
