{{- if ne .Values.enabled false }}
{{- if .Values.route.enabled }}
{{- $fullName := include "common.fullname" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
  {{- with .Values.route.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ .Values.route.gateway.name }}
      {{- with .Values.route.gateway.namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .Values.route.gateway.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  {{- with .Values.route.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        {{- if .Values.route.pathPrefix }}
        - path:
            type: PathPrefix
            value: {{ .Values.route.pathPrefix }}
        {{- else }}
        - path:
            type: PathPrefix
            value: /
        {{- end }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ .Values.service.port }}
{{- end }}
{{- end }}
