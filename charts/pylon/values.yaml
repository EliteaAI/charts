global:
  imagePullSecrets: []

# Set to false to disable this component (used for optional plugins)
enabled: true

nameOverride: ""
fullnameOverride: ""

logLevel: info

image:
  repository: ghcr.io/eliteaai/pylon
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Pod-level security context (applies to all containers, controls volume ownership)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container-level security context (capabilities, filesystem restrictions)
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

labels: {}
annotations: {}
podLabels: {}
podAnnotations: {}

service:
  enabled: true
  type: ClusterIP
  port: 8080
  containerPort: 8080
  portName: http

# HTTPRoute (Gateway API) for external access
route:
  enabled: false
  gateway:
    name: ""           # Gateway name (required if enabled)
    namespace: ""      # Gateway namespace (optional)
    sectionName: ""    # Listener name (optional)
  hostnames: []        # e.g. ["app.example.com"]
  pathPrefix: "/"      # Path prefix to match
  annotations: {}

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

storage:
  enabled: true
  size: 10Gi
  mountPath: /data
  # class: ""
  # existingClaim: ""

tmpStorage:
  enabled: true
  mountPath: /tmp
  sizeLimit: 1Gi

config:
  enabled: true
  mountPath: /app/configs
  files: {}

cacerts:
  enabled: false
  mountPath: /etc/ssl/certs/ca-certificates.crt
  # existingSecret: ""

serviceAccount:
  create: false
  name: ""
  annotations: {}

rbac:
  create: true

jobs:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}

extraVolumes: []
extraVolumeMounts: []
sidecars: []

initContainers: []

env: {}

configData: {}
#  LOG_LEVEL: "info"
#  APP_NAME: "pylon"

configRefs: {}
#  redis_host:
#    configMapName: ""
#    key: redis_host  

# Secret references (for env vars from Secret)
secretRefs: {}
#  redis_password:
#    secretName: ""
#    key: redis_password
